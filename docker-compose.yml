services:
  #  Node.js microservice 
  app:
    build: .
    container_name: activity-tracker-app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/activity_tracker
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_CLIENT_ID=activity-tracker-service
      - KAFKA_GROUP_ID=activity-log-processors
      - KAFKA_TOPIC=user-activity-logs
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network

  #  MongoDB 
  mongodb:
    image: mongo:7
    container_name: activity-tracker-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  #  Zookeeper (required by Kafka) 
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: activity-tracker-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-network

  #  Apache Kafka 
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: activity-tracker-kafka
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - app-network

volumes:
  mongo-data:


networks:
  app-network:
    driver: bridge
