apiVersion: apps/v1
kind: Deployment
metadata:
  name: activity-tracker-app
  namespace: activity-tracker
  labels:
    app: activity-tracker
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: activity-tracker
      component: api
  template:
    metadata:
      labels:
        app: activity-tracker
        component: api
    spec:
      containers:
        - name: app
          image: gcr.io/activity-tracker-proj/activity-tracker-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: app-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: app-service
  namespace: activity-tracker
spec:
  type: LoadBalancer
  selector:
    app: activity-tracker
    component: api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
